kind: pipeline
type: docker
name: main

steps:
  - name: prepare
    image: quay.io/sighup/mise:v2025.4.4
    commands:
      - mkdir -p .go/cache .go/modcache .go/tmp
      - mise install
      - eval "$(mise activate bash --shims)"
      - go mod download
    environment:
      MISE_DATA_DIR: /mise-data
      CGO_ENABLED: 0
      GOCACHE: /drone/src/.go/cache
      GOMODCACHE: /drone/src/.go/modcache
      GOTMPDIR: /drone/src/.go/tmp
    volumes:
      - name: mise-cache
        path: /mise-data
    depends_on:
      - clone

  - name: check-license
    image: quay.io/sighup/mise:v2025.4.4
    commands:
      - eval "$(mise activate bash --shims)"
      - mise run license-check
    environment:
      MISE_DATA_DIR: /mise-data
      CGO_ENABLED: 0
      GOCACHE: /drone/src/.go/cache
      GOMODCACHE: /drone/src/.go/modcache
      GOTMPDIR: /drone/src/.go/tmp
    volumes:
      - name: mise-cache
        path: /mise-data
    depends_on:
      - prepare

  - name: build
    image: quay.io/sighup/mise:v2025.4.4
    commands:
      - eval "$(mise activate bash --shims)"
      - mise run build
    environment:
      MISE_DATA_DIR: /mise-data
      CGO_ENABLED: 0
      GOCACHE: /drone/src/.go/cache
      GOMODCACHE: /drone/src/.go/modcache
      GOTMPDIR: /drone/src/.go/tmp
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
      - name: mise-cache
        path: /mise-data
    depends_on:
      - check-license
    when:
      ref:
        exclude:
          - refs/tags/v**

  - name: release
    image: quay.io/sighup/mise:v2025.4.4
    commands:
      - eval "$(mise activate bash --shims)"
      - mkdir -p /root/.docker
      - printf "%s" "$DOCKER_CONFIG_JSON" > /root/.docker/config.json
      - git reset --hard
      - git fetch --tags
      - mise run release
    environment:
      MISE_DATA_DIR: /mise-data
      CGO_ENABLED: 0
      GOCACHE: /drone/src/.go/cache
      GOMODCACHE: /drone/src/.go/modcache
      GOTMPDIR: /drone/src/.go/tmp
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
      DOCKER_CONFIG_JSON:
        from_secret: DOCKERCONFIGJSON_FURY
      COSIGN_KEY:
        from_secret: COSIGN_KEY
      COSIGN_PWD:
        from_secret: COSIGN_PASSWORD
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
      - name: mise-cache
        path: /mise-data
    depends_on:
      - check-license
    when:
      ref:
        include:
          - refs/tags/v**

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock
  - name: mise-cache
    host:
      path: /root/mise_data_dir

trigger:
  event:
    exclude:
      - pull_request
      - promote
  ref:
    exclude:
      - refs/tags/helm-chart-v**
