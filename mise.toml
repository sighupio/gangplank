[settings]
experimental = true

[tools]
golang = "1.26.2"
goreleaser = "1.24.0"
tilt = "0.33.11"
ctlptl = "0.8.28"
helm = "3.14.3"
kind = "0.31.0"
"go:github.com/google/addlicense" = "v1.1.1"

[tasks.test]
description = "Run tests"
run = "go test -count=1 -race ./..."

[tasks.build]
description = "Build binary and container image (snapshot)"
run = """
goreleaser check
goreleaser release --debug --snapshot --clean
"""

[tasks.release]
description = "Build and publish release"
run = """
goreleaser check
goreleaser release --debug --clean
"""

[tasks."license-check"]
description = "Check license headers"
run = """
addlicense -c "SIGHUP s.r.l" -y 2017-present -v -l apache \
  -ignore "deployments/helm/templates/**/*" \
  -ignore "dist/**/*" \
  -ignore ".go/**/*" \
  -ignore ".idea/**/*" \
  --check .
"""

[tasks."license-add"]
description = "Add license headers"
run = """
addlicense -c "SIGHUP s.r.l" -y 2017-present -v -l apache \
  -ignore "deployments/helm/templates/**/*" \
  -ignore "dist/**/*" \
  -ignore ".go/**/*" \
  .
"""

[tasks."dev-up"]
description = "Start local dev environment (Kind + Tilt)"
run = """
ctlptl apply -f configs/cluster.yaml
tilt up
"""

[tasks."dev-down"]
description = "Tear down local dev environment"
run = "ctlptl delete --cascade true -f configs/cluster.yaml"
